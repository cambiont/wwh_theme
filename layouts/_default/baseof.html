<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    {{ $baseCss := resources.Get "css/base.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $baseCss.RelPermalink }}" integrity="{{ $baseCss.Data.Integrity }}" />
    {{ block "head" . }}{{ end }}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
        <div class="header-right">
          <p class="meta-note">{{ .Site.Params.recipeThemeTagline | default "Simple recipe journal" }}</p>
          <a class="top-link" href="{{ "/search/" | relURL }}">Search</a>
        </div>
      </header>
      <main class="page">{{ block "main" . }}{{ end }}</main>
    </div>
  </body>
</html>
